spring.application.name=appointment-api

# Configuración de la base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/medisaludDB
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# Forzar a Flyway a que espere a que la base de datos esté lista
spring.flyway.baseline-on-migrate=true

# Le dice a Hibernate que solo VALIDE el esquema, delegando la creación total a Flyway
spring.jpa.hibernate.ddl-auto=validate